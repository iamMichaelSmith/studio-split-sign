services:
  split-sheet:
    build: .
    container_name: split-sheet-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 5050
    ports:
      - "5050:5050"
    volumes:
      - ./data/submissions:/app/data/submissions
      - ./data/pdfs:/app/data/pdfs
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:5050/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
