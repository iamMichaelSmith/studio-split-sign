<svg width="1600" height="980" viewBox="0 0 1600 980" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="980" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1220"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#F2C94C"/>
      <stop offset="1" stop-color="#D4A72C"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#17212E"/>
      <stop offset="1" stop-color="#101826"/>
    </linearGradient>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0L12 6L0 12V0Z" fill="#8FA4BC"/>
    </marker>
  </defs>

  <rect width="1600" height="980" rx="28" fill="url(#bg)"/>
  <rect x="36" y="36" width="1528" height="908" rx="28" fill="#121A27" stroke="#D4A72C" stroke-width="2"/>
  <rect x="36" y="36" width="340" height="12" rx="6" fill="url(#gold)"/>

  <text x="64" y="96" fill="white" font-size="46" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Split Sheet Open Sign - Architecture</text>
  <text x="64" y="138" fill="#B9C5D4" font-size="22" font-family="Segoe UI, Arial, sans-serif">Web workflow, plugin workflow, shared backend services, and final record delivery.</text>

  <text x="88" y="196" fill="#F8E7A9" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700">1. Clients</text>
  <rect x="72" y="220" width="280" height="122" rx="20" fill="url(#panel)" stroke="#35506B"/>
  <text x="102" y="266" fill="white" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Studio Browser</text>
  <text x="102" y="298" fill="#C7D2E0" font-size="20" font-family="Segoe UI, Arial, sans-serif">Create split sheets</text>
  <text x="102" y="326" fill="#C7D2E0" font-size="20" font-family="Segoe UI, Arial, sans-serif">In-session workflow</text>

  <rect x="72" y="372" width="280" height="122" rx="20" fill="url(#panel)" stroke="#35506B"/>
  <text x="102" y="418" fill="white" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Signer Link</text>
  <text x="102" y="450" fill="#C7D2E0" font-size="20" font-family="Segoe UI, Arial, sans-serif">Tokenized invite route</text>
  <text x="102" y="478" fill="#C7D2E0" font-size="20" font-family="Segoe UI, Arial, sans-serif">Viewed and signed states</text>

  <rect x="72" y="524" width="280" height="122" rx="20" fill="url(#panel)" stroke="#35506B"/>
  <text x="102" y="570" fill="white" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Admin Browser</text>
  <text x="102" y="602" fill="#C7D2E0" font-size="20" font-family="Segoe UI, Arial, sans-serif">Review and remind</text>
  <text x="102" y="630" fill="#C7D2E0" font-size="20" font-family="Segoe UI, Arial, sans-serif">Download artifacts</text>

  <rect x="72" y="676" width="280" height="122" rx="20" fill="url(#panel)" stroke="#6AA1FF"/>
  <text x="102" y="722" fill="white" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700">JUCE VST Client</text>
  <text x="102" y="754" fill="#C7D2E0" font-size="20" font-family="Segoe UI, Arial, sans-serif">Standalone and VST3</text>
  <text x="102" y="782" fill="#C7D2E0" font-size="20" font-family="Segoe UI, Arial, sans-serif">DAW-native capture</text>

  <text x="460" y="196" fill="#F8E7A9" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700">2. App Layer</text>
  <rect x="432" y="244" width="374" height="502" rx="24" fill="url(#panel)" stroke="#D4A72C" stroke-width="2"/>
  <text x="466" y="302" fill="white" font-size="34" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Node.js + Express</text>
  <text x="466" y="342" fill="#B9C5D4" font-size="22" font-family="Segoe UI, Arial, sans-serif">One application surface for both web and plugin clients.</text>

  <rect x="466" y="388" width="306" height="84" rx="18" fill="#101722" stroke="#334155"/>
  <text x="494" y="436" fill="#F8E7A9" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Server-rendered views</text>

  <rect x="466" y="494" width="306" height="84" rx="18" fill="#101722" stroke="#334155"/>
  <text x="494" y="542" fill="#DCE9FF" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Authenticated JSON API</text>

  <rect x="466" y="600" width="306" height="84" rx="18" fill="#101722" stroke="#334155"/>
  <text x="494" y="648" fill="#D5F5E3" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Health and ops endpoints</text>

  <text x="466" y="718" fill="#C7D2E0" font-size="20" font-family="Segoe UI, Arial, sans-serif">Session auth for admin UI</text>
  <text x="466" y="746" fill="#C7D2E0" font-size="20" font-family="Segoe UI, Arial, sans-serif">Token auth for API consumers</text>

  <text x="902" y="196" fill="#F8E7A9" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700">3. Services</text>
  <rect x="876" y="220" width="442" height="612" rx="24" fill="url(#panel)" stroke="#334155"/>

  <rect x="912" y="258" width="370" height="96" rx="18" fill="#101722" stroke="#334155"/>
  <text x="938" y="304" fill="white" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700">split-sheet-service.js</text>
  <text x="938" y="336" fill="#C7D2E0" font-size="19" font-family="Segoe UI, Arial, sans-serif">Validation, share rules, signer state, finalization</text>

  <rect x="912" y="382" width="370" height="96" rx="18" fill="#101722" stroke="#334155"/>
  <text x="938" y="428" fill="white" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700">auth-service.js</text>
  <text x="938" y="460" fill="#C7D2E0" font-size="19" font-family="Segoe UI, Arial, sans-serif">Registration, login, refresh, ownership</text>

  <rect x="912" y="506" width="370" height="96" rx="18" fill="#101722" stroke="#334155"/>
  <text x="938" y="552" fill="white" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700">submission-service.js</text>
  <text x="938" y="584" fill="#C7D2E0" font-size="19" font-family="Segoe UI, Arial, sans-serif">Drafts, records, final packets, workflow state</text>

  <rect x="912" y="630" width="370" height="96" rx="18" fill="#101722" stroke="#334155"/>
  <text x="938" y="676" fill="white" font-size="26" font-family="Segoe UI, Arial, sans-serif" font-weight="700">database-service.js</text>
  <text x="938" y="708" fill="#C7D2E0" font-size="19" font-family="Segoe UI, Arial, sans-serif">SQLite default and PostgreSQL provider path</text>

  <text x="1368" y="196" fill="#F8E7A9" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700">4. Output</text>
  <rect x="1342" y="258" width="194" height="102" rx="18" fill="#101722" stroke="#334155"/>
  <text x="1378" y="308" fill="white" font-size="25" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Database</text>
  <text x="1372" y="338" fill="#C7D2E0" font-size="18" font-family="Segoe UI, Arial, sans-serif">Users and submissions</text>

  <rect x="1342" y="396" width="194" height="102" rx="18" fill="#101722" stroke="#334155"/>
  <text x="1400" y="446" fill="white" font-size="25" font-family="Segoe UI, Arial, sans-serif" font-weight="700">PDFs</text>
  <text x="1372" y="476" fill="#C7D2E0" font-size="18" font-family="Segoe UI, Arial, sans-serif">Generated final packets</text>

  <rect x="1342" y="534" width="194" height="102" rx="18" fill="#101722" stroke="#334155"/>
  <text x="1390" y="584" fill="white" font-size="25" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Email</text>
  <text x="1364" y="614" fill="#C7D2E0" font-size="18" font-family="Segoe UI, Arial, sans-serif">Contributor delivery</text>

  <rect x="432" y="844" width="1104" height="72" rx="18" fill="#101722" stroke="#334155"/>
  <text x="464" y="888" fill="#B9C5D4" font-size="20" font-family="Segoe UI, Arial, sans-serif">Why this exists: a session can end with a verbal agreement, but the paperwork still needs to be captured, signed, stored, and delivered fast.</text>

  <line x1="352" y1="281" x2="432" y2="286" stroke="#8FA4BC" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="352" y1="433" x2="432" y2="422" stroke="#8FA4BC" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="352" y1="585" x2="432" y2="558" stroke="#8FA4BC" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="352" y1="737" x2="432" y2="694" stroke="#8FA4BC" stroke-width="3" marker-end="url(#arrow)"/>

  <line x1="806" y1="494" x2="876" y2="494" stroke="#8FA4BC" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="1282" y1="306" x2="1342" y2="309" stroke="#8FA4BC" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="1282" y1="554" x2="1342" y2="447" stroke="#8FA4BC" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="1282" y1="554" x2="1342" y2="585" stroke="#8FA4BC" stroke-width="3" marker-end="url(#arrow)"/>
</svg>
