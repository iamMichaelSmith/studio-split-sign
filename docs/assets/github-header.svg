  <text x="78" y="110" fill="white" font-size="50" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Split Sheet Open Sign</text>
  <text x="78" y="150" fill="#B9C5D4" font-size="22" font-family="Segoe UI, Arial, sans-serif">A studio workflow system for split sheets, signatures, PDFs, and delivery.</text>
  <text x="78" y="182" fill="#8FA4BC" font-size="18" font-family="Segoe UI, Arial, sans-serif">Built to close the end-of-session paperwork gap without leaving the studio workflow.</text>

  <rect x="78" y="236" width="228" height="94" rx="20" fill="url(#panel)" stroke="#35506B"/>
  <text x="108" y="278" fill="white" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Web App</text>
  <text x="108" y="308" fill="#C7D2E0" font-size="19" font-family="Segoe UI, Arial, sans-serif">Studio session workflow</text>

  <rect x="78" y="360" width="228" height="94" rx="20" fill="url(#panel)" stroke="#35506B"/>
  <text x="108" y="402" fill="white" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700">VST Client</text>
  <text x="108" y="432" fill="#C7D2E0" font-size="19" font-family="Segoe UI, Arial, sans-serif">DAW-native entry point</text>

  <rect x="390" y="278" width="254" height="136" rx="22" fill="url(#panel)" stroke="#D4A72C" stroke-width="2"/>
  <text x="422" y="330" fill="white" font-size="30" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Express App</text>
  <text x="422" y="364" fill="#F8E7A9" font-size="22" font-family="Segoe UI, Arial, sans-serif" font-weight="600">JSON API + Views</text>
  <text x="422" y="394" fill="#C7D2E0" font-size="18" font-family="Segoe UI, Arial, sans-serif">One backend for browser and plugin flows</text>

  <rect x="730" y="218" width="214" height="78" rx="18" fill="url(#panel)" stroke="#334155"/>
  <text x="758" y="264" fill="white" font-size="24" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Split Validation</text>

